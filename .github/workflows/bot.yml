name: Trading Bot V6 N200c

on:
  schedule:
    # brain + alert: 8:00 PM IST = 14:30 UTC (Sun-Thu)
    - cron: "30 14 * * 0-4"
    # morning reminder: 8:00 AM IST = 02:30 UTC (Mon-Fri)
    - cron: "30 2 * * 1-5"
    # scoreboard: 3:35 PM IST = 10:05 UTC (Mon-Fri)
    - cron: "5 10 * * 1-5"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run manually"
        required: true
        default: "brain"
        type: choice
        options:
          - brain
          - scoreboard
          - morning

env:
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:

  # ── Job 1: Brain + Alert — 8:00 PM IST ────────────────────────
  brain:
    name: Brain + Alert (8 PM IST)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'brain' ||
      github.event_name == 'schedule' && github.event.schedule == '30 14 * * 0-4'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run brain (fetch + screen + write signals.json)
        run: python brain.py

      - name: Run alert (read signals.json + send Telegram + log paper trades)
        run: python alert.py

      - name: Commit signals.json and paper_trades.csv
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@trading-bot-v2"
          git add signals.json paper_trades.csv
          git diff --cached --quiet || git commit -m "bot: signals $(date -u '+%Y-%m-%d %H:%M')"
          git push

  # ── Job 2: Scoreboard — 3:35 PM IST ──────────────────────────
  scoreboard:
    name: Scoreboard (3:35 PM IST)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scoreboard' ||
      github.event_name == 'schedule' && github.event.schedule == '5 10 * * 1-5'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scoreboard (close trades + send Telegram + write trade_log)
        run: python scoreboard.py

      - name: Commit paper_trades.csv and trade_log.csv
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@trading-bot-v2"
          git add paper_trades.csv trade_log.csv
          git diff --cached --quiet || git commit -m "scoreboard: update $(date -u '+%Y-%m-%d %H:%M')"
          git push

  # ── Job 3: Morning reminder — 8:00 AM IST ─────────────────────
  morning:
    name: Morning Reminder (8 AM IST)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'morning' ||
      github.event_name == 'schedule' && github.event.schedule == '30 2 * * 1-5'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send morning reminder (read-only — no commits)
        run: python alert.py --reminder
